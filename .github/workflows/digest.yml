name: daily digest

on:
  schedule:
    # 06:12 UTC every day (offset from the top of the hour to avoid the rush)
    - cron: "12 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build today's digest
        run: python -m radar

      - name: Commit and push if the digest changed
        run: |
          git config user.name "Hasitha Bandara"
          git config user.email "hasitha@dynarq.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes today; nothing to commit."
          else
            git commit -m "Daily AI digest: $(date -u +%Y-%m-%d)"
            git push
          fi
